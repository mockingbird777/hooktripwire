<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">HookTripwire social preview</title>
  <desc id="description">HookTripwire audits AI-agent hooks before they run, with offline static analysis, SARIF, policies, and baselines.</desc>
  <defs>
    <linearGradient id="background" x1="80" y1="40" x2="1160" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111A31"/>
      <stop offset="0.56" stop-color="#080D19"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <linearGradient id="shield" x1="120" y1="132" x2="470" y2="522" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9A8CFF"/>
      <stop offset="0.48" stop-color="#6EE7D8"/>
      <stop offset="1" stop-color="#3AB7C8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(260 280) rotate(34) scale(380 300)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5C67DB" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#5C67DB" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#AAB7D5" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#background)"/>
  <rect width="1280" height="640" rx="28" fill="url(#grid)"/>
  <ellipse cx="260" cy="290" rx="400" ry="320" fill="url(#glow)"/>
  <circle cx="1090" cy="80" r="190" fill="#3A2F78" opacity="0.16" filter="url(#softGlow)"/>

  <g transform="translate(92 104)">
    <path d="M186 16 42 70v116c0 108 58 190 144 228 86-38 144-120 144-228V70L186 16Z" fill="#0B1223" stroke="url(#shield)" stroke-width="8"/>
    <path d="M186 56 79 96v89c0 82 41 146 107 179 66-33 107-97 107-179V96L186 56Z" fill="#111B30" stroke="#8090BA" stroke-opacity="0.24" stroke-width="2"/>
    <path d="M92 164h70l30 43 38-73h50" fill="none" stroke="url(#shield)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="92" cy="164" r="11" fill="#9A8CFF"/>
    <circle cx="280" cy="134" r="11" fill="#6EE7D8"/>
    <circle cx="192" cy="207" r="13" fill="#0B1223" stroke="#FF6C91" stroke-width="7"/>
    <path d="m137 279 34 34 72-78" fill="none" stroke="#6EE7D8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(515 112)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(0 0)">
      <rect width="194" height="36" rx="18" fill="#18243C" stroke="#344463"/>
      <circle cx="20" cy="18" r="5" fill="#6EE7D8"/>
      <text x="36" y="23" fill="#B9C6E2" font-size="14" font-weight="700" letter-spacing="1.2">AGENT SECURITY</text>
    </g>
    <text x="0" y="112" fill="#F4F7FF" font-size="66" font-weight="800" letter-spacing="-2.6">HookTripwire</text>
    <text x="0" y="180" fill="#D2D9EA" font-size="33" font-weight="650" letter-spacing="-0.6">Audit AI-agent hooks</text>
    <text x="0" y="222" fill="#D2D9EA" font-size="33" font-weight="650" letter-spacing="-0.6">before they run.</text>
    <text x="0" y="278" fill="#8998B8" font-size="19">Commands are analyzed as text and never executed.</text>

    <g transform="translate(0 326)" font-size="15" font-weight="700">
      <g><rect width="168" height="43" rx="10" fill="#121D31" stroke="#2B3A59"/><text x="18" y="27" fill="#9AABCA">OFFLINE STATIC</text></g>
      <g transform="translate(180 0)"><rect width="94" height="43" rx="10" fill="#121D31" stroke="#2B3A59"/><text x="19" y="27" fill="#9AABCA">SARIF 2.1</text></g>
      <g transform="translate(286 0)"><rect width="190" height="43" rx="10" fill="#121D31" stroke="#2B3A59"/><text x="18" y="27" fill="#9AABCA">POLICY + BASELINES</text></g>
    </g>

    <g transform="translate(0 400)" font-size="16">
      <circle cx="6" cy="7" r="6" fill="#6EE7D8"/>
      <text x="24" y="13" fill="#AEBBD6">15 focused rules</text>
      <circle cx="194" cy="7" r="6" fill="#9A8CFF"/>
      <text x="212" y="13" fill="#AEBBD6">zero runtime dependencies</text>
    </g>
  </g>

  <text x="1190" y="590" text-anchor="end" fill="#52617E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">github.com/mockingbird777/hooktripwire</text>
</svg>
