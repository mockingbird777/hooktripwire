name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node.js ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm test

  package:
    name: Verify package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify package manifest
        run: npm pack --dry-run
      - name: Smoke-test secure example
        run: node dist/cli.js examples/secure-agent-settings.json --fail-on high
      - name: Smoke-test the local composite action
        uses: ./
        with:
          target: examples/unsafe-agent-settings.json
          format: json
          output: ${{ runner.temp }}/hooktripwire-action-report.json
          fail-on: none
          map-hooks: true
          max-hook-depth: 8
      - name: Validate the action report
        run: node --input-type=module --eval "import { readFile } from 'node:fs/promises'; const report = JSON.parse(await readFile(process.argv[1], 'utf8')); if (report.findings.length !== 7 || !Array.isArray(report.hookPaths)) process.exit(1)" "${{ runner.temp }}/hooktripwire-action-report.json"
